<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.0.1/dist/cookieconsent.css">

<script type="module">
    import { run } from 'https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.0.1/dist/cookieconsent.esm.js';

    run({
        guiOptions: {
            consentModal: {
                layout: "box",
                position: "bottom right",
                equalWeightButtons: true,
                flipButtons: false
            }
        },
        categories: {
            necessary: { enabled: true, readonly: true },
            analytics: {
                enabled: false, // Default is OFF for GDPR compliance
                autoClear: {
                    cookies: [
                        { name: /^_ga/ }, // Clear GA cookies if they opt-out later
                        { name: '_gid' }
                    ]
                }
            }
        },
        language: {
            default: "en",
            translations: {
                en: {
                    consentModal: {
                        title: "Hello Flamingo! 🦩",
                        description: "We use cookies to understand how you interact with our code. Is that cool?",
                        acceptAllBtn: "Accept all",
                        acceptNecessaryBtn: "Reject all",
                        showPreferencesBtn: "Manage preferences"
                    },
                    preferencesModal: {
                        title: "Cookie Preferences",
                        acceptAllBtn: "Accept all",
                        acceptNecessaryBtn: "Reject all",
                        savePreferencesBtn: "Save preferences",
                        sections: [
                            {
                                title: "Analytics Cookies",
                                description: "These cookies help us improve the site.",
                                linkedCategory: "analytics"
                            }
                        ]
                    }
                }
            }
        },
        // The Magic Logic: Only fire GA if they click Accept
        onFirstConsent: ({ cookie }) => {
            if (cookie.categories.includes('analytics')) {
                loadGA();
            }
        },
        onChange: ({ cookie }) => {
            if (cookie.categories.includes('analytics')) {
                loadGA();
            } else {
                window.location.reload(); // Hard reset if they change their mind
            }
        }
    });

    function loadGA() {        
        // google analytics key is set in hugo.toml under [services.googleAnalytics]
        const id = '{{ .Site.Config.Services.GoogleAnalytics.ID }}';
        const script = document.createElement('script');
        script.src = `https://www.googletagmanager.com/gtag/js?id=${id}`;
        script.async = true;
        document.head.appendChild(script);

        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', id);
    }
</script>
